[phases.setup]
aptPkgs = [
    "libgl1-mesa-glx",
    "libglib2.0-0", 
    "libsm6",
    "libxext6",
    "libxrender1",
    "libgomp1",
    "libxcb1",
    "gdal-bin",
    "libgdal-dev"
]

[phases.install]
cmds = ["pip install --no-cache-dir -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
