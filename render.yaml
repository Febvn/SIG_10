services:
  # Database
  - type: pserv
    name: webgis-lampung-db
    plan: free
    region: singapore
    env: docker
    
  # Backend API
  - type: web
    name: webgis-lampung-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DATABASE_URL
        fromDatabase:
          name: webgis-lampung-db
          property: connectionString
    
  # Frontend Static Site
  - type: web
    name: webgis-lampung-frontend
    runtime: static
    region: singapore
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://webgis-lampung-api.onrender.com
